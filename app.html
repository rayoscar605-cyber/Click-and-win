<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Click & Win - ID Oficial</title>

    <!-- SDK DE START.IO CON TU NUEVO ID: 202131417 -->
    <script src="https://start.io" type="text/javascript"></script>
    <script type="text/javascript">
        var startAppSdk = new StartApp.SDK();
        startAppSdk.init("202131417");
    </script>

    <style>
        body { font-family: sans-serif; text-align: center; background: #0f172a; color: white; padding: 20px; }
        .card { background: #1e293b; max-width: 350px; margin: auto; padding: 25px; border-radius: 30px; border: 1px solid #334155; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        #btn-main { width: 160px; height: 160px; border-radius: 50%; border: none; background: #fbbf24; font-size: 24px; font-weight: bold; cursor: pointer; margin: 20px 0; box-shadow: 0 8px #92400e; }
        #btn-main:active { transform: translateY(4px); box-shadow: 0 4px #92400e; }
        #btn-main:disabled { background: #475569; color: #94a3b8; cursor: not-allowed; box-shadow: none; }
        .points { font-size: 45px; color: #fbbf24; font-weight: bold; display: block; }
    </style>
</head>
<body>

    <div class="card">
        <span style="color: #94a3b8; font-size: 12px; text-transform: uppercase;">Puntos Acumulados</span>
        <span class="points" id="val-puntos">0</span>
        
        <div style="display: flex; justify-content: space-around; margin: 20px 0; font-size: 14px;">
            <div>Clics: <b id="val-clics">3</b></div>
            <div>Ads: <b id="val-ads">0</b>/20</div>
        </div>
        
        <button id="btn-main">¡CLICK!</button>
        <p id="msg-limite" style="color: #f87171; display: none; font-weight: bold;">🚫 Has llegado al límite de hoy.</p>
    </div>

    <script>
        // Variables de datos (usamos nombres únicos para no chocar con versiones viejas)
        let misPuntos = parseInt(localStorage.getItem('pts_vFinal')) || 0;
        let misAds = parseInt(localStorage.getItem('ads_vFinal')) || 0;
        let miContador = 3;
        const fechaHoy = new Date().toLocaleDateString();

        // Reinicio diario
        if (localStorage.getItem('fecha_vFinal') !== fechaHoy) {
            misAds = 0;
            localStorage.setItem('ads_vFinal', 0);
            localStorage.setItem('fecha_vFinal', fechaHoy);
        }

        function refrescarUI() {
            document.getElementById('val-puntos').innerText = misPuntos;
            document.getElementById('val-clics').innerText = miContador;
            document.getElementById('val-ads').innerText = misAds;
            if (misAds >= 20) {
                document.getElementById('btn-main').disabled = true;
                document.getElementById('msg-limite').style.display = "block";
            }
        }

        document.getElementById('btn-main').onclick = function() {
            if (misAds >= 20) return;

            miContador--;

            if (miContador === 0) {
                // LLAMADA AL ANUNCIO REAL
                try {
                    startAppSdk.showInterstitial();
                } catch(e) {
                    console.log("Cargando anuncio...");
                }

                // Premio aleatorio de 1 a 5
                let premio = Math.floor(Math.random() * 5) + 1;
                
                misAds++;
                misPuntos += premio;
                
                // Guardar progreso
                localStorage.setItem('pts_vFinal', misPuntos);
                localStorage.setItem('ads_vFinal', misAds);
                
                miContador = 3; // Reiniciar contador
                alert("🎁 ¡Felicidades! Ganaste " + premio + " puntos.");
            }
            refrescarUI();
        };

        refrescarUI(); // Mostrar datos al cargar
    </script>
</body>
</html>
