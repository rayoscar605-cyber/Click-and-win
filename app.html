 <!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Click & Win</title>
    <!-- CONEXIÓN REAL CON START.IO -->
    <script src="https://start.io" type="text/javascript"></script>
    <script type="text/javascript">
        var startapp = new StartApp.Banner("202858798"); 
    </script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #0f172a; color: white; padding: 20px; }
        .card { background: #1e293b; max-width: 350px; margin: auto; padding: 25px; border-radius: 30px; border: 1px solid #334155; }
        #btn-click { width: 150px; height: 150px; border-radius: 50%; border: none; background: #fbbf24; font-size: 22px; font-weight: bold; cursor: pointer; margin: 20px 0; box-shadow: 0 6px #92400e; }
        #btn-click:active { transform: translateY(3px); box-shadow: 0 3px #92400e; }
        #btn-click:disabled { background: #475569; color: #94a3b8; box-shadow: none; cursor: not-allowed; }
        .points { font-size: 40px; color: #fbbf24; font-weight: bold; display: block; }
    </style>
</head>
<body>
    <div class="card">
        <span style="color: #94a3b8; font-size: 12px;">PUNTOS TOTALES</span>
        <span class="points" id="pts">0</span>
        <div style="display: flex; justify-content: space-around; margin: 15px 0; font-size: 14px;">
            <div>Clics: <b id="clic">3</b></div>
            <div>Ads hoy: <b id="ads">0</b>/20</div>
        </div>
        <button id="btn-click">¡CLICK!</button>
        <p id="bloqueo" style="color: #f87171; display: none; font-weight: bold;">🚫 Límite de 20 anuncios alcanzado.</p>
    </div>

    <script>
        let pts = parseInt(localStorage.getItem('p')) || 0;
        let ads = parseInt(localStorage.getItem('a')) || 0;
        let c = 3;
        const hoy = new Date().toLocaleDateString();

        if (localStorage.getItem('f') !== hoy) { ads = 0; localStorage.setItem('a', 0); localStorage.setItem('f', hoy); }

        function up() {
            document.getElementById('pts').innerText = pts;
            document.getElementById('clic').innerText = c;
            document.getElementById('ads').innerText = ads;
            if (ads >= 20) { document.getElementById('btn-click').disabled = true; document.getElementById('bloqueo').style.display = "block"; }
        }

        document.getElementById('btn-click').onclick = () => {
            c--;
            if (c === 0) {
                // LLAMADA AL ANUNCIO REAL
                startapp.showInterstitial(); 
                ads++;
                let r = Math.floor(Math.random() * 5) + 1;
                pts += r;
                localStorage.setItem('p', pts);
                localStorage.setItem('a', ads);
                c = 3;
                alert("🎁 ¡Ganaste " + r + " puntos!");
            }
            up();
        };
        up();
    </script>
</body>
</html>
